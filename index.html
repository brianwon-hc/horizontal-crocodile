<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Horizontal Crocodile — The Game</title>
<script>document.documentElement.classList.add('mobile-mode-boot');document.body?.classList.add('mobile-mode');</script>
<link rel="stylesheet" href="styles.css"/>
</head>
<body class="mobile-mode">
  <div id="game-wrap">
  <div id="cabinet-stage">
  <div id="canvas-wrap">
    <div id="screen-content">
      <canvas id="gc"></canvas>
      <canvas id="fx"></canvas>
      <canvas id="crt-overlay"></canvas>
      <div id="gameover-exclusion" aria-hidden="true"></div>
      <div id="overlay" aria-hidden="true">
        <div id="gameover-main">
          <img id="gameover-image" src="./assets/HC_GAME/UI/gameover copy.png" alt=""/>
          <div id="gameover-best-wrap">
            <div id="gameover-best-label">HIGH SCORE</div>
            <div id="gameover-best-value">   0</div>
          </div>
          <div id="gameover-actions">
            <button id="playagain-btn" class="gameover-btn" type="button" aria-label="Play again">PLAY AGAIN</button>
            <button id="leaderboard-btn" class="gameover-btn" type="button" aria-label="Leaderboard">LEADERBOARD</button>
          </div>
        </div>
        <div id="leaderboard-screen" aria-hidden="true">
          <div id="leaderboard-frame">
            <img id="leaderboard-image" src="./assets/HC_GAME/UI/topchompers.png" alt=""/>
            <img id="leaderboard-borders" src="./assets/HC_GAME/UI/borders.png" alt=""/>
            <div id="leaderboard-croco" aria-hidden="true"><div id="leaderboard-croco-strip"></div></div>
            <div id="leaderboard-bird-1" class="leaderboard-bird" aria-hidden="true"><div class="leaderboard-bird-strip"></div></div>
            <div id="leaderboard-bird-2" class="leaderboard-bird" aria-hidden="true"><div class="leaderboard-bird-strip"></div></div>
            <div id="leaderboard-bird-3" class="leaderboard-bird" aria-hidden="true"><div class="leaderboard-bird-strip"></div></div>
            <div id="leaderboard-bird-4" class="leaderboard-bird" aria-hidden="true"><div class="leaderboard-bird-strip"></div></div>
            <div id="leaderboard-entries" aria-live="polite"></div>
          </div>
          <div id="leaderboard-entry-overlay" aria-hidden="true">
            <div id="leaderboard-entry-backdrop"></div>
            <form id="name-entry-modal" class="leaderboard-entry-modal" autocomplete="off">
              <img class="leaderboard-entry-window" src="./assets/HC_GAME/UI/Entername.png" alt="New top chomper, enter your name"/>
              <input id="leaderboard-name-input" class="leaderboard-entry-input" type="text" maxlength="16" placeholder="YOUR NAME" autocomplete="off" autocapitalize="words" spellcheck="false"/>
            </form>
            <form id="email-entry-modal" class="leaderboard-entry-modal" autocomplete="off">
              <img class="leaderboard-entry-window" src="./assets/HC_GAME/UI/Submit email.png" alt="Submit email to claim prize"/>
              <div id="golden-ticket-stars" aria-hidden="true">
                <img class="golden-ticket-star" src="./assets/HC_GAME/UI/star.png" alt=""/>
                <img class="golden-ticket-star" src="./assets/HC_GAME/UI/star.png" alt=""/>
                <img class="golden-ticket-star" src="./assets/HC_GAME/UI/star.png" alt=""/>
                <img class="golden-ticket-star" src="./assets/HC_GAME/UI/star.png" alt=""/>
              </div>
              <div id="leaderboard-email-prize-copy">ENTER EMAIL TO CLAIM PRIZE * NO SPAM * I PROMISE</div>
              <input id="leaderboard-email-input" class="leaderboard-entry-input" type="email" maxlength="80" placeholder="name@email.com" autocomplete="email" autocapitalize="none" spellcheck="false"/>
              <button id="leaderboard-email-later-btn" type="button">MAYBE LATER</button>
            </form>
            <div id="share-preview-modal" class="leaderboard-entry-modal" role="dialog" aria-label="Share card preview">
              <div id="share-preview-panel">
                <div id="share-preview-card-wrap">
                  <img id="share-preview-image" alt="Horizontal Crocodile score share card"/>
                  <div id="share-preview-score" aria-hidden="true"></div>
                </div>
                <div id="share-preview-actions">
                  <button id="share-preview-download-btn" type="button">DOWNLOAD</button>
                  <button id="share-preview-close-btn" type="button">CLOSE</button>
                </div>
              </div>
            </div>
          </div>
          <div id="leaderboard-actions">
            <button id="leaderboard-playagain-btn" class="gameover-btn" type="button" aria-label="Play again from leaderboard">PLAY AGAIN</button>
            <button id="leaderboard-preorder-btn" class="gameover-btn" type="button" aria-label="Share score">SHARE SCORE</button>
          </div>
        </div>
      </div>
      <div id="start-screen-layer" aria-hidden="true">
      <div id="start-logo"></div>
      <img id="start-label" src="./assets/HC_GAME/UI/start.png" alt=""/>
      <div id="croc-start-sprite">
        <div id="croc-start-strip"></div>
      </div>
        <img id="sandwich-hands" src="./assets/HC_GAME/UI/sandwich_hands.png" alt=""/>
        <img id="copyright-mark" src="./assets/HC_GAME/UI/copyright.png" alt=""/>
      </div>
    </div>
  </div>
    <div id="board-hud" aria-hidden="true">
      <div class="board-hud-block left">
        <span class="board-hud-label">SCORE </span><span class="board-hud-value" id="score-val">0</span>
      </div>
      <div class="board-hud-block right">
        <span class="board-hud-label">HIGH SCORE </span><span class="board-hud-value" id="best-val">0</span>
      </div>
    </div>
    <button id="music-toggle" type="button" aria-label="Toggle music">
      <img id="music-toggle-img" src="./assets/images/buttons/PlayUp.png" alt=""/>
    </button>
    <button id="pause-toggle" type="button" aria-label="Pause gameplay">PAUSE</button>
    <button id="warp-debug-btn" type="button" aria-label="Jump to post-warp">POST WARP</button>
    <div id="title-area">
      <h1>Horizontal Crocodile</h1>
      <p>Eat the sandwiches. Don't eat yourself.</p>
    </div>
    <div id="controls-hint">Arrow keys or WASD &nbsp;·&nbsp; Mobile: swipe to turn</div>
    <div id="book-link">Based on <a href="https://brianwon.com" target="_blank">Horizontal Crocodile</a> by Scott Rothman &amp; Brian Won</div>
  </div>
</div>

<!-- Mobile handheld skin + d-pad (shown only in ?mobile=1 mode) -->
<div id="worm-talk-wrap">
  <img id="worm-talk" src="./assets/HC_GAME/UI/worm_talk_03.png" alt=""/>
  <img id="worm-talk-lights" src="./assets/HC_GAME/UI/light_01.png" alt="" aria-hidden="true"/>
  <div id="worm-message" aria-live="polite"></div>
  <div id="caterpillar-idle" aria-hidden="true">
    <div id="caterpillar-idle-strip"></div>
    <div id="caterpillar-talk-strip"></div>
  </div>
</div>

<div id="mobile-handheld">
  <img id="mobile-skin-img" src="./assets/HC_GAME/UI/handheld.png" alt=""/>
  <div id="button-ui-layer" aria-hidden="false">
    <img id="button-pause-art" class="button-ui-art" src="./assets/HC_GAME/UI/buttons_PauseOff.png" alt=""/>
    <img id="button-sound-art" class="button-ui-art" src="./assets/HC_GAME/UI/buttons_SoundOff.png" alt=""/>
    <img id="button-select-art" class="button-ui-art" src="./assets/HC_GAME/UI/buttons_SelectOn.png" alt=""/>
    <img id="button-start-art" class="button-ui-art" src="./assets/HC_GAME/UI/buttons_StartOff.png" alt=""/>
    <img id="button-preorder-art" class="button-ui-art" src="./assets/HC_GAME/UI/preorder_off.png" alt=""/>
    <button id="button-sound-hit" class="button-ui-hit" type="button" aria-label="Toggle sound"></button>
    <button id="button-pause-hit" class="button-ui-hit" type="button" aria-label="Pause gameplay"></button>
    <button id="button-preorder-hit" class="button-ui-hit" type="button" aria-label="Preorder Horizontal Crocodile"></button>
    <button id="button-select-hit" class="button-ui-hit" type="button" aria-label="Select"></button>
    <button id="button-start-hit" class="button-ui-hit" type="button" aria-label="Start"></button>
  </div>
  <img class="dpad-idle-arrow" id="dpad-idle-up"    src="./assets/HC_GAME/UI/dapd_up_black.png"    alt=""/>
  <img class="dpad-idle-arrow" id="dpad-idle-down"  src="./assets/HC_GAME/UI/dapd_down_black.png"  alt=""/>
  <img class="dpad-idle-arrow" id="dpad-idle-left"  src="./assets/HC_GAME/UI/dapd_left_black.png"  alt=""/>
  <img class="dpad-idle-arrow" id="dpad-idle-right" src="./assets/HC_GAME/UI/dapd_right_black.png" alt=""/>
  <img class="dpad-overlay" id="dpad-overlay-up"    src="./assets/HC_GAME/UI/dapd_up.png"    alt=""/>
  <img class="dpad-overlay" id="dpad-overlay-down"  src="./assets/HC_GAME/UI/dapd_down.png"  alt=""/>
  <img class="dpad-overlay" id="dpad-overlay-left"  src="./assets/HC_GAME/UI/dapd_left.png"  alt=""/>
  <img class="dpad-overlay" id="dpad-overlay-right" src="./assets/HC_GAME/UI/dapd_right.png" alt=""/>
  <div id="dpad">
    <div class="dpad-corner"></div>
    <div class="dpad-btn" id="dpad-up"></div>
    <div class="dpad-corner"></div>
    <div class="dpad-btn" id="dpad-left"></div>
    <div class="dpad-corner"></div>
    <div class="dpad-btn" id="dpad-right"></div>
    <div class="dpad-corner"></div>
    <div class="dpad-btn" id="dpad-down"></div>
    <div class="dpad-corner"></div>
  </div>
  <button id="test-top10-flow-btn" type="button">TEST TOP 10</button>
</div>

<script src="script.js"></script>
</body>
</html>
